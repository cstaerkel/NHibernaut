name: Release
on:
  push:
    tags: ['v*']

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Install fpm
        run: sudo gem install --no-document fpm
      - name: Publish (linux-x64)
        run: dotnet publish src/NHibernaut.Server.Host -c Release -r linux-x64 --self-contained true -p:Version=$VERSION -o publish/linux-x64
      - name: Lay out package root
        run: |
          mkdir -p pkgroot/usr/lib/nhibernaut-dashboard pkgroot/lib/systemd/system pkgroot/etc/nhibernaut-dashboard
          cp -r publish/linux-x64/* pkgroot/usr/lib/nhibernaut-dashboard/
          install -m644 installers/linux/nhibernaut-dashboard.service pkgroot/lib/systemd/system/nhibernaut-dashboard.service
          install -m640 installers/linux/dashboard.env pkgroot/etc/nhibernaut-dashboard/dashboard.env
      - name: Build .deb and .rpm
        run: |
          for t in deb rpm; do
            fpm -s dir -t $t -n nhibernaut-dashboard -v "$VERSION" --iteration 1 \
              --description "NHibernaut profiler dashboard server" \
              --url "https://github.com/cstaerkel/NHibernaut" --license MIT \
              --after-install installers/linux/after-install.sh \
              --before-remove installers/linux/before-remove.sh \
              --config-files /etc/nhibernaut-dashboard/dashboard.env \
              -C pkgroot .
          done
      - name: Smoke test (.deb install → start → curl)
        run: |
          sudo dpkg -i nhibernaut-dashboard_${VERSION}-1_amd64.deb
          printf 'NHIBERNAUT_BIND=127.0.0.1\nNHIBERNAUT_PORT=5005\n' | sudo tee /etc/nhibernaut-dashboard/dashboard.env
          # If the service fails to start, dump status + journal so the failure is self-explaining
          # instead of a blind systemd timeout.
          sudo systemctl enable --now nhibernaut-dashboard || {
            echo "::group::nhibernaut-dashboard failed to start";
            sudo systemctl status nhibernaut-dashboard -l --no-pager || true;
            sudo journalctl -xeu nhibernaut-dashboard --no-pager || true;
            echo "::endgroup::";
            exit 1;
          }
          curl -fs --retry 30 --retry-connrefused --retry-delay 1 http://127.0.0.1:5005/api/sessions
          test "$(curl -fs http://127.0.0.1:5005/api/sessions)" = "[]"
          curl -fs -o /dev/null -w "%{http_code}" http://127.0.0.1:5005/ | grep -q 200
      - uses: actions/upload-artifact@v6
        with:
          name: linux-installers
          path: |
            nhibernaut-dashboard_*.deb
            nhibernaut-dashboard-*.rpm
      - name: Publish Desktop (linux-x64)
        run: dotnet publish src/NHibernaut.App -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:InvariantGlobalization=true -p:DebugType=none -p:Version=$VERSION -o publish/desktop-linux-x64
      - name: Tarball Desktop
        run: tar -C publish/desktop-linux-x64 -czf "nhibernaut-app-${VERSION}-linux-x64.tar.gz" .
      - name: AppImage Desktop
        # appimagetool runs with --appimage-extract-and-run (in build-appimage.sh) so no FUSE/libfuse2
        # is needed on the runner — ubuntu-24.04 renamed libfuse2 to libfuse2t64, so installing it fails.
        run: bash installers/desktop/linux/build-appimage.sh publish/desktop-linux-x64 "$VERSION"
      - name: Upload desktop (linux)
        uses: actions/upload-artifact@v6
        with:
          name: desktop-linux
          path: "nhibernaut-app-*-linux-x64.*"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Derive version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Install WiX v5
        run: dotnet tool install --global wix --version 5.*
      - name: Publish (win-x64)
        run: dotnet publish src/NHibernaut.Server.Host -c Release -r win-x64 --self-contained true -p:Version=$env:VERSION -o publish/win-x64
      - name: Build MSI
        run: wix build installers/windows/Package.wxs -arch x64 -d Version=$env:VERSION -d "PublishDir=publish/win-x64" -o "nhibernaut-dashboard-$env:VERSION-win-x64.msi"
      - name: Smoke test (MSI install → start → curl)
        shell: pwsh
        run: |
          Start-Process msiexec.exe -ArgumentList "/i nhibernaut-dashboard-$env:VERSION-win-x64.msi /quiet /norestart" -Wait
          # The SCM reads a service's per-service Environment (REG_MULTI_SZ) at start,
          # so override the bind to loopback here (machine env vars are not re-read on restart).
          $svc = "HKLM:\SYSTEM\CurrentControlSet\Services\NHibernautDashboard"
          New-ItemProperty -Path $svc -Name Environment -PropertyType MultiString -Value @("NHIBERNAUT_BIND=127.0.0.1") -Force | Out-Null
          Restart-Service NHibernautDashboard
          $ok = $false
          for ($i=0; $i -lt 30; $i++) {
            try { if ((Invoke-WebRequest http://127.0.0.1:5005/api/sessions -UseBasicParsing).Content -eq "[]") { $ok=$true; break } } catch {}
            Start-Sleep 1
          }
          if (-not $ok) { throw "dashboard did not come up" }
      - uses: actions/upload-artifact@v6
        with: { name: windows-installer, path: "*.msi" }
      - name: Publish Desktop (win-x64)
        run: dotnet publish src/NHibernaut.App -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:InvariantGlobalization=true -p:DebugType=none -p:Version=$env:VERSION -o publish/desktop-win-x64
      - name: Zip portable Desktop
        shell: pwsh
        run: Compress-Archive -Path publish/desktop-win-x64/* -DestinationPath "nhibernaut-app-$env:VERSION-win-x64.zip"
      - name: Build Desktop MSI
        run: wix build installers/desktop/windows/Package.wxs -arch x64 -d Version=$env:VERSION -d "PublishDir=publish/desktop-win-x64" -o "nhibernaut-app-$env:VERSION-win-x64.msi"
      - name: Upload desktop (windows)
        uses: actions/upload-artifact@v6
        with:
          name: desktop-windows
          path: "nhibernaut-app-*-win-x64.*"

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Publish (osx-arm64)
        run: dotnet publish src/NHibernaut.Server.Host -c Release -r osx-arm64 --self-contained true -p:Version=$VERSION -o publish/osx-arm64
      - name: Build .pkg
        run: |
          mkdir -p payload/usr/local/nhibernaut-dashboard payload/Library/LaunchDaemons
          cp -r publish/osx-arm64/* payload/usr/local/nhibernaut-dashboard/
          cp installers/macos/com.nhibernaut.dashboard.plist payload/Library/LaunchDaemons/
          chmod 644 payload/Library/LaunchDaemons/com.nhibernaut.dashboard.plist
          chmod +x installers/macos/scripts/postinstall
          pkgbuild --root payload --scripts installers/macos/scripts \
            --identifier com.nhibernaut.dashboard --version "$VERSION" \
            --install-location / "nhibernaut-dashboard-${VERSION}-osx-arm64.pkg"
      - name: Smoke test (.pkg install → start → curl)
        run: |
          /usr/libexec/PlistBuddy -c "Set :EnvironmentVariables:NHIBERNAUT_BIND 127.0.0.1" payload/Library/LaunchDaemons/com.nhibernaut.dashboard.plist
          pkgbuild --root payload --scripts installers/macos/scripts --identifier com.nhibernaut.dashboard --version "$VERSION" --install-location / smoke.pkg
          sudo installer -pkg smoke.pkg -target /
          curl -fs --retry 30 --retry-connrefused --retry-delay 1 http://127.0.0.1:5005/api/sessions
          test "$(curl -fs http://127.0.0.1:5005/api/sessions)" = "[]"
      - uses: actions/upload-artifact@v6
        with: { name: macos-installer, path: "nhibernaut-dashboard-*-osx-arm64.pkg" }
      - name: Publish Desktop (osx-arm64, folder)
        run: dotnet publish src/NHibernaut.App -c Release -r osx-arm64 --self-contained true -p:InvariantGlobalization=true -p:DebugType=none -p:Version=$VERSION -o publish/desktop-osx-arm64
      - name: Build .app bundle
        run: bash installers/desktop/macos/build-app.sh publish/desktop-osx-arm64 "$VERSION"
      - name: Zip .app and build .dmg
        run: |
          ditto -c -k --keepParent "NHibernaut.app" "nhibernaut-app-${VERSION}-osx-arm64.zip"
          # hdiutil create intermittently fails with "Resource busy" on GitHub's macOS runners —
          # a transient race as the freshly-written .app/volume settles, not a real build error.
          # Retry a few times so a flake doesn't sink the whole release (it did on v0.2.0).
          dmg="nhibernaut-app-${VERSION}-osx-arm64.dmg"
          for attempt in 1 2 3 4 5; do
            if hdiutil create -volname "NHibernaut" -srcfolder "NHibernaut.app" -ov -format UDZO "$dmg"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::hdiutil create failed after 5 attempts"
              exit 1
            fi
            echo "hdiutil create failed (attempt $attempt) — likely transient 'Resource busy'; retrying in 5s…"
            sleep 5
          done
      - name: Upload desktop (macos)
        uses: actions/upload-artifact@v6
        with:
          name: desktop-macos
          path: "nhibernaut-app-*-osx-arm64.*"

  nuget:
    runs-on: ubuntu-latest
    # The nuget.org Trusted Publishing policy is bound to the "release" environment,
    # so the OIDC token must carry that environment claim or the token exchange 401s.
    environment: release
    permissions:
      id-token: write   # OIDC token for NuGet Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Pack the three libraries
        run: dotnet pack NHibernaut.sln -c Release -p:Version=$VERSION -p:ContinuousIntegrationBuild=true -o nupkgs
      # Trusted Publishing (OIDC) — no long-lived API key. One-time setup:
      #   1. nuget.org -> Trusted Publishing -> add a policy for this owner/repo
      #      with workflow file "release.yml" (reserve the NHibernaut.* names first).
      #   2. Add a repository variable NUGET_USER = your nuget.org username (profile name).
      # If NUGET_USER is unset the push is skipped so the pipeline still runs
      # end-to-end (packages are attached to the release either way).
      - name: NuGet login (Trusted Publishing / OIDC -> short-lived key)
        id: login
        if: ${{ vars.NUGET_USER != '' }}
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push to NuGet.org
        if: ${{ vars.NUGET_USER != '' }}
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - uses: actions/upload-artifact@v6
        with: { name: nuget-packages, path: "nupkgs/*.*nupkg" }

  release:
    needs: [linux, windows, macos, nuget]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v7
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/**
